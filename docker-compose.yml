services:
  postgres:
    image: postgres:15
    container_name: smartlife-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartlife-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: smartlife-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-themes:/opt/keycloak/themes
    networks:
      - smartlife-network

  backend:
    build: ./backend
    container_name: smartlife-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai-service:8001
      JWT_SECRET: ${JWT_SECRET}
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:7860"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

    networks:
      - smartlife-network

  ai-service:
    build: ./ai-service
    container_name: smartlife-ai
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
    networks:
      - smartlife-network

  frontend:
    build: ./frontend
    container_name: smartlife-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smartlife-network

  redis:
    image: redis:7-alpine
    container_name: smartlife-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - smartlife-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: smartlife-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - smartlife-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: smartlife-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: smartlife123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - smartlife-network
    depends_on:
      - prometheus

networks:
  smartlife-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
