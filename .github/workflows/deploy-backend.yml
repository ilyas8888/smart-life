name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

# Hugging Face rejects simultaneous force pushes to the same Space branch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-backend-hf-space
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Hugging Face Spaces remote
        run: git remote add hf-space https://ilyas8888:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/ilyas8888/smartlife-backend

      - name: Deploy backend subtree
        run: |
          git subtree split --prefix backend -b hf-deploy
          git push hf-space hf-deploy:main --force
          git branch -D hf-deploy
