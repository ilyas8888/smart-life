<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SmartLife" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%smartlife-icon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%smartlife-icon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>SmartLife - Gestionnaire Personnel Intelligent</title>
    <script>
      // Restore path saved by 404.html SPA redirect
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', '/smart-life' + redirect);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
