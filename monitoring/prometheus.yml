global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Local Spring Boot backend
  - job_name: 'smartlife-backend-local'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          environment: 'local'

