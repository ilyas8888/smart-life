spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/smartlife}
    username: ${SPRING_DATASOURCE_USERNAME:smartlife_user}
    password: ${SPRING_DATASOURCE_PASSWORD:smartlife_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:smartlife-jwt-secret-key-2024-change-in-prod}
  expiration: 900000  # 15min in ms

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}
  internal:
    secret: ${AI_INTERNAL_SECRET:}

app:
  otp:
    enabled: ${OTP_ENABLED:false}

logging:
  level:
    com.smartlife: DEBUG
    org.springframework.security: INFO
