worker_processes 1;
events { worker_connections 512; }

http {
    upstream keycloak   { server 127.0.0.1:8180; keepalive 4; }
    upstream springboot { server 127.0.0.1:8080; keepalive 4; }

    server {
        listen 7860;
        server_name _;
        client_max_body_size 10m;

        # Keycloak endpoints
        location ~ ^/(realms|admin|resources|js|welcome)(/|$) {
            proxy_pass         http://keycloak;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Port  443;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_buffer_size  128k;
            proxy_buffers      8 128k;
            proxy_read_timeout 120s;
        }

        # Spring Boot (everything else)
        location / {
            proxy_pass         http://springboot;
            proxy_http_version 1.1;
            proxy_set_header   Host             "ilyas8888-smartlife-backend.hf.space";
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host "ilyas8888-smartlife-backend.hf.space";
            proxy_set_header   X-Forwarded-Port  443;
            proxy_read_timeout 90s;
        }
    }
}
